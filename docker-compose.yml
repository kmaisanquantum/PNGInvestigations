version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-investigator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investigator}
      POSTGRES_DB: ${POSTGRES_DB:-investigations}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investigator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-investigator}:${POSTGRES_PASSWORD:-investigator}@postgres:5432/${POSTGRES_DB:-investigations}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      EVIDENCE_STORAGE_PATH: /data/evidence
    volumes:
      - evidence_data:/data/evidence
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  evidence_data:
